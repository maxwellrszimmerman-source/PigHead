      <style>
         /* =========================
   RESET + ROOT VARIABLES
========================= */
         * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
         }

         :root {
            --bg: linear-gradient(135deg, #0b0b12, #141427, #1a1330);
            --card: rgba(20, 20, 35, 0.7);
            --border: rgba(168, 85, 247, 0.25);
            --text: #ffffff;
            --muted: #cbd5e1;
            --accent1: #a855f7;
            --accent2: #6366f1;
         }

         /* =========================
   BODY
========================= */
         body {
            font-family: "DM Sans", system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            background: var(--bg);
            color: var(--text);
         }
body {
   -webkit-font-smoothing: antialiased;
   -moz-osx-font-smoothing: grayscale;
}
         /* =========================
   SIDEBAR
========================= */
         .sidebar {
            width: 270px;
            padding: 20px;
            position: sticky;
            top: 0;
            height: 100vh;

            background: var(--card);
            backdrop-filter: blur(14px);

            border-right: 1px solid var(--border);

            display: flex;
            flex-direction: column;
            gap: 12px;
         }

         .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
         }

         /* =========================
   SEARCH
========================= */
         .search {
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border);
            outline: none;

            background: rgba(0, 0, 0, 0.25);
            color: var(--text);
         }

         /* =========================
   GENRE FILTERS
========================= */
         .genres {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
         }

         .genre-btn {
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 0.75rem;

            background: rgba(0, 0, 0, 0.2);
            color: var(--muted);

            transition: 0.2s;
         }

         .genre-btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent1);
         }

         .genre-btn.active {
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
            color: var(--text);
            border: none;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
         }
         .favorite-btn {
            width: 22px;
            height: 22px;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 14px;
            line-height: 1;

            background: rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.7);

            border-radius: 6px;

            cursor: pointer;
            transition: 0.2s ease;

            backdrop-filter: blur(6px);
         }

         .favorite-btn:hover {
            transform: scale(1.1);
            border-color: var(--accent1);
            color: white;
            background: rgba(0, 0, 0, 0.4);
         }

         .favorite-btn.active {
            color: #ffd54a;
            border-color: rgba(255, 213, 74, 0.6);
            background: rgba(255, 213, 74, 0.15);
         }
         .card-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
         }
         /* =========================
   MAIN
========================= */
         .main {
            flex: 1;
            padding: 35px;
         }

         .header h1 {
            font-size: 3rem;
            font-weight: 800;
            color: var(--text);
         }

         .header p {
            color: var(--muted);
            margin-top: 8px;
         }

         /* =========================
   GRID
========================= */
         .container {
            margin-top: 25px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 18px;
         }

         /* =========================
   GAME CARD (BOX)
========================= */
         .box {
            position: relative;
            overflow: hidden;

            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 220px;
            height: 100%;

            background: rgba(20, 20, 35, 0.7);
            border: 1px solid rgba(168, 85, 247, 0.2);
            border-radius: 18px;
            padding: 18px;

            backdrop-filter: blur(10px);
            transition: 0.25s;
         }

         .box:hover {
            transform: translateY(-6px);
            border-color: var(--accent1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
         }

         /* overlay */
         .box::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 0;
            background: rgba(0, 0, 0, 0.55);
         }

         /* keep text above overlay */
         .box * {
            position: relative;
            z-index: 1;
         }

         /* =========================
   BOX TEXT
========================= */
         .box h3 {
            font-size: 1.2rem;
            margin-bottom: 6px;
            color: white;
         }

         .box p {
            color: #cbd5e1;
            font-size: 0.9rem;
            margin-bottom: 10px;
         }

         /* =========================
   GENRE TAG
========================= */
         .genre-tag {
            display: inline-block;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 999px;
            margin-bottom: 8px;

            background: rgba(0, 0, 0, 0.2);
            color: var(--muted);
            border: 1px solid var(--border);

            transition: 0.2s ease;
         }

         /* =========================
   BUTTON
========================= */

         .box > button:not(.favorite-btn) {
            width: 100%;
            margin-top: auto;

            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);

            font-weight: 700;
            cursor: pointer;

            background: linear-gradient(135deg, var(--accent1), var(--accent2));
            color: var(--text);

            backdrop-filter: blur(10px);
            transition: 0.2s ease;
         }
         .box button:hover {
            transform: translateY(-2px);
            filter: brightness(1.15);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
         }

         .box button:active {
            transform: translateY(0px);
            filter: brightness(0.95);
         }

         /* =========================
   THEME UI
========================= */
         .theme-title {
            font-size: 0.8rem;
            color: #888;
            margin-top: 10px;
         }

         .themes {
            display: flex;
            flex-direction: column;
            gap: 6px;
         }

         .theme-btn {
            padding: 8px;
            border-radius: 10px;
            border: 1px solid var(--border);

            background: rgba(0, 0, 0, 0.2);
            color: var(--muted);

            cursor: pointer;
            transition: 0.2s;
         }

         .theme-btn:hover {
            transform: translateX(3px);
            border-color: var(--accent1);
         }

         .theme-btn.active {
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
            color: white;
            border: none;
         }

            align-items: center;
            gap: 6px;
         }
         .fav-item {
            display: flex;
            align-items: center;
            gap: 8px;

            padding: 8px;
            border-radius: 10px;
            border: 1px solid var(--border);

            background: rgba(0, 0, 0, 0.2);
            color: var(--muted);

            cursor: pointer;
            transition: 0.2s;
         }

.fav-item {

   cursor: pointer;
   transition: 0.2s;

            themeBtns.forEach((b) => b.classList.remove("active"));
            document
               .querySelector(`[data-theme="${name}"]`)
               .classList.add("active");
         }

         themeBtns.forEach((btn) => {
            btn.onclick = () => applyTheme(btn.dataset.theme);
         });

         applyTheme(localStorage.getItem("theme") || "dark");

         /* FAVORITES */
         function saveFavorites() {
            localStorage.setItem("favorites", JSON.stringify(favorites));
            renderFavorites();
         }

         function toggleFavorite(item) {
            const index = favorites.findIndex((f) => f.name === item.name);

            if (index === -1) {
               favorites.push(item);
            } else {
               favorites.splice(index, 1);
            }

            saveFavorites();
         }

         function renderFavorites() {
            favoritesBar.innerHTML = "";

            if (favorites.length === 0) {
               favoritesBar.innerHTML = `<div style="color:#777;font-size:0.8rem;">No favorites yet</div>`;
               return;
            }

            favorites.forEach((item) => {
               const btn = document.createElement("button");

               // 👇 IMPORTANT: separate class
               btn.className = "fav-item";

               btn.textContent = item.name;

               btn.onclick = async () => {
   const res = await fetch(item.url);
   let html = await res.text();

   const base = item.url.slice(0, item.url.lastIndexOf("/") + 1);

   if (/<head/i.test(html)) {
      html = html.replace(
         /<head([^>]*)>/i,
         `<head$1><base href="${base}">`
      );
   } else {
      html = `<head><base href="${base}"></head>` + html;
   }

   const w = window.open("about:blank");
   w.document.write(html);
   w.document.close();
};

               favoritesBar.appendChild(btn);
            });
         }

         /* GENRES */
         const genres = ["All", ...new Set(data.map((g) => g.genre))];

         genres.forEach((g) => {
            const btn = document.createElement("button");
            btn.className = "genre-btn";
            btn.textContent = g;

            if (g === "All") btn.classList.add("active");

            btn.onclick = () => {
               document
                  .querySelectorAll(".genre-btn")
                  .forEach((b) => b.classList.remove("active"));
               btn.classList.add("active");
               activeGenre = g;
               applyFilters();
            };

            genreBar.appendChild(btn);
         });

         /* RENDER */
         function render(list) {
            container.innerHTML = "";

            list.forEach((item) => {
               const box = document.createElement("div");
               box.className = "box";

               box.style.background = `
         linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
         url(${item.image})
      `;
               box.style.backgroundSize = "cover";
               box.style.backgroundPosition = "center";

               const isFav = favorites.some((f) => f.name === item.name);

               box.innerHTML = `
         <div class="top">
            <div class="card-topbar">
               <div class="genre-tag">${item.genre}</div>
               <button class="favorite-btn ${isFav ? "active" : ""}">★</button>
            </div>

            <h3>${item.name}</h3>
            <p>${item.description}</p>
         </div>

         <button>Launch Game</button>
      `;

               const favBtn = box.querySelector(".favorite-btn");
               favBtn.onclick = (e) => {
                  e.stopPropagation();
                  toggleFavorite(item);
                  applyFilters();
               };

               const launch = box.querySelector("button:not(.favorite-btn)");
               launch.onclick = async () => {
                  const res = await fetch(item.url);
                  let html = await res.text();

                  const base = item.url.slice(0, item.url.lastIndexOf("/") + 1);

                  if (/<head/i.test(html)) {
                     html = html.replace(
                        /<head([^>]*)>/i,
                        `<head$1><base href="${base}">`,
                     );
                  } else {
                     html = `<head><base href="${base}"></head>` + html;
                  }

                  const w = window.open("about:blank");
                  w.document.write(html);
                  w.document.close();
               };

               container.appendChild(box);
            });
         }
         /* FILTERS */
         function applyFilters() {
            const q = search.value.toLowerCase();

            const filtered = data.filter((item) => {
               const match =
                  item.name.toLowerCase().includes(q) ||
                  item.description.toLowerCase().includes(q) ||
                  item.genre.toLowerCase().includes(q);

               const ok = activeGenre === "All" || item.genre === activeGenre;

               return match && ok;
            });

            render(filtered);
         }

         search.addEventListener("input", applyFilters);

         renderFavorites();
         render(data);
      </script>
   </body>
</html>
