<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  min-height:100vh;
  overflow-x:hidden;

  padding:40px 30px;

  transition:
    background 0.5s ease,
    color 0.5s ease;

  background:
    linear-gradient(135deg,#0f172a,#111827,#020617);

  color:white;
}

/* Animated background glow */

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(
      120deg,
      rgba(255,255,255,0.03),
      rgba(255,255,255,0.01)
    );
  backdrop-filter:blur(2px);
  z-index:-1;
}

/* Header */

.header{
  text-align:center;
  margin-bottom:50px;
}

.header h1{
  font-size:4rem;
  font-weight:800;
  letter-spacing:-2px;

  background:linear-gradient(to right,#ffffff,#93c5fd,#c4b5fd);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  text-shadow:
    0 0 30px rgba(255,255,255,0.15);

  animation:fadeDown 1s ease;
}

.header p{
  margin-top:10px;
  color:#cbd5e1;
  font-size:1.1rem;
}

/* Grid */

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:24px;
}

/* Card */

.box{
  position:relative;

  background:rgba(255,255,255,0.08);

  border:1px solid rgba(255,255,255,0.12);

  border-radius:24px;

  padding:24px;

  backdrop-filter:blur(14px);

  overflow:hidden;

  transition:
    transform .35s ease,
    box-shadow .35s ease,
    border .35s ease;

  animation:fadeUp .7s ease forwards;

  opacity:0;
}

/* Card glow */

.box::before{
  content:"";
  position:absolute;
  inset:-2px;

  background:linear-gradient(
    135deg,
    rgba(255,255,255,0.15),
    rgba(255,255,255,0),
    rgba(96,165,250,0.2)
  );

  border-radius:24px;

  z-index:-1;
}

/* Hover */

.box:hover{
  transform:translateY(-10px) scale(1.02);

  border:1px solid rgba(255,255,255,0.25);

  box-shadow:
    0 20px 40px rgba(0,0,0,0.4),
    0 0 30px rgba(96,165,250,0.15);
}

/* Game title */

.box h3{
  font-size:1.5rem;
  font-weight:700;
  margin-bottom:10px;
}

/* Description */

.box p{
  color:#cbd5e1;
  line-height:1.6;
  min-height:60px;
  margin-bottom:20px;
}

/* Button */

.box button{
  border:none;
  outline:none;

  background:linear-gradient(
    135deg,
    #3b82f6,
    #8b5cf6
  );

  color:white;

  padding:14px 22px;

  border-radius:14px;

  font-weight:700;
  font-size:1rem;

  cursor:pointer;

  transition:
    transform .25s ease,
    box-shadow .25s ease;

  width:100%;
}

/* Button hover */

.box button:hover{
  transform:translateY(-3px);

  box-shadow:
    0 10px 25px rgba(99,102,241,0.4);
}

/* Button click */

.box button:active{
  transform:scale(0.98);
}

/* Animations */

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(30px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes fadeDown{
  from{
    opacity:0;
    transform:translateY(-30px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* Mobile */

@media(max-width:600px){

  body{
    padding:25px 18px;
  }

  .header h1{
    font-size:2.8rem;
  }

}

/* TOPBAR */

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:40px;
}

.logo{
  font-size:2rem;
  font-weight:800;

  background:linear-gradient(to right,#60a5fa,#c084fc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* THEME SELECT */

/* THEME DROPDOWN */

#themeSelector{

  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;

  padding:14px 22px;

  border:none;
  outline:none;

  border-radius:14px;

  font-weight:700;
  font-size:1rem;

  cursor:pointer;

  color:white;

  background:
    linear-gradient(
      135deg,
      #3b82f6,
      #8b5cf6
    );

  box-shadow:
    0 10px 25px rgba(99,102,241,0.25);

  transition:
    transform .25s ease,
    box-shadow .25s ease,
    opacity .25s ease;

  position:relative;

  min-width:80px;
}

/* Hover */

#themeSelector:hover{

  transform:translateY(-3px);

  box-shadow:
    0 15px 30px rgba(99,102,241,0.4);
}

/* Click */

#themeSelector:active{
  transform:scale(0.98);
}

/* Dropdown options */

#themeSelector option{
  background:#111827;
  color:white;
  font-weight:700;
}

/* LIGHT THEME */

body.light #themeSelector{

  background:
    linear-gradient(
      135deg,
      #2563eb,
      #7c3aed
    );

  color:white;
}

/* NEON THEME */

body.neon #themeSelector{

  background:
    linear-gradient(
      135deg,
      #ff00ff,
      #00ffff
    );

  box-shadow:
    0 0 20px rgba(0,255,255,0.25);
}
/* LIGHT THEME */

body.light{

  background:
    linear-gradient(
      135deg,
      #f8fafc,
      #e2e8f0
    );

  color:#111827;
}

body.light .box{
  background:rgba(255,255,255,0.75);

  border:1px solid rgba(0,0,0,0.08);

  color:#111827;
}

body.light .box p{
  color:#374151;
}

body.light #themeSelector{
  background:white;
  color:black;
}

body.light .header p{
  color:#374151;
}

/* NEON THEME */

body.neon{

  background:
    radial-gradient(circle at top left,#ff00ff 0%,transparent 30%),
    radial-gradient(circle at bottom right,#00ffff 0%,transparent 30%),
    linear-gradient(135deg,#050816,#020617);

  color:white;
}

body.neon .box{

  background:rgba(0,0,0,0.45);

  border:1px solid rgba(0,255,255,0.3);

  box-shadow:
    0 0 20px rgba(0,255,255,0.15);
}

body.neon .box:hover{

  box-shadow:
    0 0 25px rgba(255,0,255,0.3),
    0 0 40px rgba(0,255,255,0.25);
}

body.neon button{

  background:
    linear-gradient(
      135deg,
      #ff00ff,
      #00ffff
    );
}

body.neon .header h1{

  background:
    linear-gradient(
      to right,
      #ff00ff,
      #00ffff
    );

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* MOBILE */

@media(max-width:700px){

  .topbar{
    flex-direction:column;
    gap:20px;
  }

}
</style>
</head>

<script>

const data = JSON.parse(
  document.getElementById("linkData").textContent
);

const container = document.getElementById("boxContainer");

data.forEach((item,index)=>{

  const box = document.createElement("div");
  box.className = "box";

  box.style.animationDelay = `${index * 0.08}s`;

  box.innerHTML = `
    <h3>${item.name}</h3>
    <p>${item.description}</p>
    <button>Launch Game</button>
  `;

  const button = box.querySelector("button");

  button.onclick = async () => {

    button.textContent = "Loading...";

    try{

      const res = await fetch(item.url);

      if(!res.ok){
        throw new Error(`Fetch failed: ${res.status}`);
      }

      let html = await res.text();

      const baseHref =
        item.url.slice(0,item.url.lastIndexOf('/') + 1);

      if(/<head[^>]*>/i.test(html)){

        html = html.replace(
          /<head([^>]*)>/i,
          `<head$1><base href="${baseHref}">`
        );

      } else {

        html =
          `<head><base href="${baseHref}"></head>` + html;

      }

      const w = window.open("about:blank");

      if(!w){
        throw new Error("Popup blocked");
      }

      w.document.open();
      w.document.write(html);
      w.document.close();

      button.textContent = "Launch Game";

    } catch(err){

      console.error(err);

      button.textContent = "Launch Game";

      alert("Failed to load page: " + err.message);

    }

  };

  container.appendChild(box);

});
/* =========================
   THEME SYSTEM
========================= */

const themeSelector =
  document.getElementById("themeSelector");

const savedTheme =
  localStorage.getItem("hub-theme") || "dark";

document.body.classList.add(savedTheme);

themeSelector.value = savedTheme;

themeSelector.addEventListener("change", () => {

  document.body.classList.remove(
    "dark",
    "light",
    "neon"
  );

  document.body.classList.add(
    themeSelector.value
  );

  localStorage.setItem(
    "hub-theme",
    themeSelector.value
  );

});
</script>
